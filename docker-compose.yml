services:
  backend:
    build: ./backend
    container_name: kb-backend
    volumes:
      - ./data/files:/data/files
      - ./data/db:/data/db
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kb-frontend
    ports:
      - "8000:80"
    depends_on:
      - backend
    restart: unless-stopped
